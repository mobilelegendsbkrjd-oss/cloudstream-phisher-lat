name: Build Cloudstream Extension (DEX)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Build extension
        run: ./gradlew assembleRelease

      - name: Install Android build tools
        run: |
          sudo apt update
          sudo apt install -y unzip wget
          wget https://dl.google.com/android/repository/build-tools_r33.0.2-linux.zip
          unzip build-tools_r33.0.2-linux.zip

      - name: Convert AAR to DEX
        run: |
          mkdir output
          AAR=$(find . -name "*.aar" | head -n 1)
          unzip "$AAR" -d aar
          unzip aar/classes.jar -d classes
          build-tools/android-13/d8 classes --output output

      - name: Upload DEX
        uses: actions/upload-artifact@v3
        with:
          name: extension-dex
          path: output/classes.dex
